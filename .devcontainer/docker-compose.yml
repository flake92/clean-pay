name: clean-pay-dev

x-clean-pay-env: &clean-pay-env
  NODE_ENV: development
  NEXT_TELEMETRY_DISABLED: "1"
  WATCHPACK_POLLING: "true"
  DATABASE_URL: postgresql://clean_pay:clean_pay@postgres:5432/clean_pay?schema=public
  APP_URL: http://localhost:4000
  NEXT_PUBLIC_APP_URL: http://localhost:4000
  LOG_LEVEL: debug
  REMNASHOP_API_BASE_URL: http://remnashop:5000/api/v1/public
  REDIS_URL: redis://redis:6379/0
  WEB_JWT_SECRET: dev-web-jwt-secret-change-me
  WEB_REFRESH_SECRET: dev-web-refresh-secret-change-me
  AUDIT_IP_HASH_SECRET: dev-audit-ip-hash-secret-change-me
  COOKIE_SECURE: "false"
  COOKIE_SAMESITE: lax

  TELEGRAM_OIDC_ISSUER: http://telegram-oidc-mock:8090
  TELEGRAM_OIDC_AUTHORIZATION_ENDPOINT: http://localhost:8090/auth
  TELEGRAM_OIDC_TOKEN_ENDPOINT: http://telegram-oidc-mock:8090/token
  TELEGRAM_OIDC_JWKS_URI: http://telegram-oidc-mock:8090/.well-known/jwks.json
  TELEGRAM_OIDC_CLIENT_ID: dev-telegram-client-id
  TELEGRAM_OIDC_CLIENT_SECRET: dev-telegram-client-secret

  TURNSTILE_ENABLED: "false"
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
  TURNSTILE_SECRET_KEY: ""
  TURNSTILE_VERIFY_URL: https://challenges.cloudflare.com/turnstile/v0/siteverify
  SUPPORT_ENABLED: "true"
  SUPPORT_EMAIL: support@example.com
  SUPPORT_TELEGRAM_USERNAME: cleanpay_support
  SUPPORT_FAQ_URL: http://localhost:4000/support

x-remnashop-env: &remnashop-env
  APP_DOMAIN: remnashop.localhost
  APP_HOST: 0.0.0.0
  APP_PORT: "5000"
  APP_CRYPT_KEY: cdLLqAspR/IqBkkOKM5qvCKE9LluVyRxTe2SMKd/9vs=
  APP_SWAGGER_ENABLED: "true"
  WEB_ENABLED: "true"
  WEB_CABINET_URL: http://localhost:4000
  APP_API_KEY: dev-remnashop-api-key-change-me
  APP_JWT_SECRET: dev-remnashop-jwt-secret-change-me

  BOT_TOKEN: "0000000000:dev-telegram-bot-token-placeholder"
  BOT_SECRET_TOKEN: dev-bot-secret-token
  BOT_OWNER_ID: "1"
  BOT_SUPPORT_USERNAME: cleanpay_support
  BOT_API_BASE_URL: http://telegram-mock:8080
  BOT_MINI_APP: "false"
  BOT_RESET_WEBHOOK: "false"
  BOT_DROP_PENDING_UPDATES: "false"
  BOT_SETUP_COMMANDS: "false"

  REMNAWAVE_HOST: http://remnawave-mock:3000
  REMNAWAVE_TOKEN: dev-remnawave-token
  REMNAWAVE_WEBHOOK_SECRET: dev-remnawave-webhook-secret

  DATABASE_HOST: remnashop-postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: remnashop
  DATABASE_USER: remnashop
  DATABASE_PASSWORD: remnashop

  REDIS_HOST: remnashop-cache
  REDIS_PORT: "6379"
  REDIS_NAME: "0"
  REDIS_PASSWORD: ""

  # Dev-only email delivery through local Mailpit.
  # These variables are intentionally duplicated with EMAIL/SMTP/MAIL names
  # because the upstream Remnashop image may use different config aliases.
  EMAIL_ENABLED: "true"
  EMAIL_HOST: smtp
  EMAIL_PORT: "1025"
  EMAIL_USE_TLS: "false"
  EMAIL_USE_SSL: "false"
  EMAIL_USERNAME: ""
  EMAIL_PASSWORD: ""
  EMAIL_FROM_EMAIL: no-reply@example.com
  EMAIL_FROM_NAME: Clean Pay Dev
  EMAIL_VERIFICATION_CODE_TTL_MINUTES: "15"

  SMTP_ENABLED: "true"
  SMTP_HOST: smtp
  SMTP_PORT: "1025"
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_TLS: "false"
  SMTP_USE_SSL: "false"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM_EMAIL: no-reply@example.com
  SMTP_FROM_NAME: Clean Pay Dev

  MAIL_ENABLED: "true"
  MAIL_HOST: smtp
  MAIL_PORT: "1025"
  MAIL_TLS: "false"
  MAIL_SSL: "false"
  MAIL_USE_TLS: "false"
  MAIL_USE_SSL: "false"
  MAIL_USERNAME: ""
  MAIL_PASSWORD: ""
  MAIL_USER: ""
  MAIL_PASS: ""
  MAIL_FROM_EMAIL: no-reply@example.com
  MAIL_FROM_NAME: Clean Pay Dev

  LOG_TO_FILE: "false"
  LOG_LEVEL: DEBUG

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: >
      sh -c "sudo mkdir -p /workspace/clean-pay/node_modules /home/node/.npm
      && sudo chown -R node:node /workspace/clean-pay/node_modules /home/node/.npm
      && sudo chmod 666 /var/run/docker.sock
      && sleep infinity"
    working_dir: /workspace/clean-pay
    environment:
      <<: *clean-pay-env
      CLEAN_PAY_DOCKER_HOST_ROOT: ${CLEAN_PAY_DOCKER_HOST_ROOT:-/Users/alex/code/clean-pay}
      CLEAN_PAY_INTEGRATION_BASE_URL: http://host.docker.internal:4100
      CLEAN_PAY_INTEGRATION_MAILPIT_URL: http://host.docker.internal:8125
      CLEAN_PAY_INTEGRATION_OIDC_URL: http://host.docker.internal:8190
    volumes:
      - ..:/workspace/clean-pay:cached
      - ..:${CLEAN_PAY_DOCKER_HOST_ROOT:-/Users/alex/code/clean-pay}:cached
      - node-modules:/workspace/clean-pay/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      remnashop:
        condition: service_started
      telegram-oidc-mock:
        condition: service_started
    ports:
      - "4000:4000"
      - "5555:5555"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clean_pay
      POSTGRES_USER: clean_pay
      POSTGRES_PASSWORD: clean_pay
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clean_pay -d clean_pay"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "6379:6379"

  remnashop:
    build:
      context: .
      dockerfile: remnashop-dev.Dockerfile
    image: clean-pay-dev-remnashop:latest
    restart: unless-stopped
    environment:
      <<: *remnashop-env
    depends_on:
      remnashop-postgres:
        condition: service_healthy
      remnashop-cache:
        condition: service_healthy
      smtp:
        condition: service_started
      telegram-mock:
        condition: service_started
    volumes:
      - remnashop-assets:/opt/remnashop/assets
      - remnashop-logs:/opt/remnashop/logs
    ports:
      - "5001:5000"

  remnashop-worker:
    image: clean-pay-dev-remnashop:latest
    restart: unless-stopped
    command: taskiq worker src.infrastructure.taskiq.worker:worker --workers 1 --ack-type when_received --tasks-pattern src/infrastructure/taskiq/tasks/*.py -fsd
    environment:
      <<: *remnashop-env
    depends_on:
      remnashop-postgres:
        condition: service_healthy
      remnashop-cache:
        condition: service_healthy

  remnashop-scheduler:
    image: clean-pay-dev-remnashop:latest
    restart: unless-stopped
    command: taskiq scheduler src.infrastructure.taskiq.scheduler:scheduler --tasks-pattern src/infrastructure/taskiq/tasks/*.py -fsd
    environment:
      <<: *remnashop-env
    depends_on:
      remnashop-postgres:
        condition: service_healthy
      remnashop-cache:
        condition: service_healthy

  remnashop-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: remnashop
      POSTGRES_USER: remnashop
      POSTGRES_PASSWORD: remnashop
      TZ: UTC
    volumes:
      - remnashop-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remnashop -d remnashop"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "6767:5432"

  remnashop-cache:
    image: valkey/valkey:9-alpine
    restart: unless-stopped
    command: valkey-server --save "" --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru --loglevel warning
    volumes:
      - remnashop-cache-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  remnawave-mock:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /mock
    command: node server.js
    volumes:
      - ./remnawave-mock:/mock:ro

  telegram-mock:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /mock
    command: node server.js
    volumes:
      - ./telegram-mock:/mock:ro

  telegram-oidc-mock:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /mock
    command: node server.js
    environment:
      PORT: "8090"
      OIDC_ISSUER: http://telegram-oidc-mock:8090
      OIDC_PUBLIC_ISSUER: http://localhost:8090
      OIDC_CLIENT_ID: dev-telegram-client-id
    volumes:
      - ./telegram-oidc-mock:/mock:ro
    ports:
      - "8090:8090"

  smtp:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 20

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_started
      remnashop:
        condition: service_started
      smtp:
        condition: service_started
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8026:8026"

volumes:
  node-modules:
  postgres-data:
  redis-data:
  remnashop-postgres-data:
  remnashop-cache-data:
  remnashop-assets:
  remnashop-logs:
  caddy-data:
  caddy-config:
