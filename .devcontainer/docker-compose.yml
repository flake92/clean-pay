volumes:
  postgres-data:
  redis-data:
  node-modules:

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile

    volumes:
      - ../..:/workspaces:cached
      - node-modules:/workspaces/clean-pay/node_modules
      
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Use proper Docker networking instead of network_mode: service:db
    # to ensure reliable DNS resolution in all environments
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      remnashop-mock:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      turnstile-mock:
        condition: service_healthy
    networks:
      - app-network
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres?schema=public
      APP_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:4000
      REMNASHOP_API_BASE_URL: ${REMNASHOP_API_BASE_URL:-http://remnashop-mock:8080/api/v1/public}
      # Uses the dev Redis service by default. Override REDIS_URL to connect a real external Redis.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WEB_JWT_SECRET: dev-web-jwt-secret-change-me
      WEB_REFRESH_SECRET: dev-web-refresh-secret-change-me
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      TELEGRAM_OIDC_ISSUER: https://oauth.telegram.org
      TELEGRAM_OIDC_AUTHORIZATION_ENDPOINT: https://oauth.telegram.org/auth
      TELEGRAM_OIDC_TOKEN_ENDPOINT: https://oauth.telegram.org/token
      TELEGRAM_OIDC_JWKS_URI: https://oauth.telegram.org/.well-known/jwks.json
      TELEGRAM_OIDC_CLIENT_ID: dev-telegram-client-id
      TELEGRAM_OIDC_CLIENT_SECRET: dev-telegram-client-secret
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-dev-turnstile-site-key}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-dev-turnstile-secret}
      TURNSTILE_VERIFY_URL: ${TURNSTILE_VERIFY_URL:-http://turnstile-mock:8787/turnstile/v0/siteverify}

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally. 
    # (Adding the "ports" property to this file will not forward from a Codespace.)
    ports:
      - "4000:4000"
      - "4001:4001"
      - "5555:5555"

  db:
    image: postgres:latest
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

    # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  remnashop-mock:
    image: node:24-bookworm
    restart: unless-stopped
    working_dir: /workspaces/clean-pay
    command: node scripts/dev/remnashop-mock.mjs
    networks:
      - app-network
    volumes:
      - ../..:/workspaces:cached
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://127.0.0.1:8080/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  turnstile-mock:
    image: node:24-bookworm
    restart: unless-stopped
    working_dir: /workspaces/clean-pay
    command: node scripts/dev/turnstile-mock.mjs
    networks:
      - app-network
    volumes:
      - ../..:/workspaces:cached
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://127.0.0.1:8787/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - redis-data:/data

networks:
  app-network:
    driver: bridge
