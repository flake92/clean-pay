<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Clean Pay — контрактный макет</title>
  <style>
    @font-face{font-family:"Inter var";font-style:normal;font-weight:100 900;font-display:swap;src:url("../../../public/themes/lara-light-indigo/fonts/Inter-roman.var.woff2") format("woff2")}
    :root{--bg:#eff3f8;--card:#fff;--text:#334155;--muted:#64748b;--border:#dce3ec;--primary:#6366f1;--primary2:#4f46e5;--danger:#ef4444;--ok:#16a34a;--warn:#d97706;--shadow:0 1px 3px rgba(15,23,42,.12)}
    *{box-sizing:border-box}html{min-height:100%}body{margin:0;background:var(--bg);color:#111827;font-family:"Inter var",Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100%;overflow-x:hidden}a{color:var(--primary);text-decoration:none}.top{height:80px;position:fixed;inset:0 0 auto;background:#fff;display:flex;align-items:center;padding:0 32px;z-index:997;box-shadow:0 3px 5px #00000005,0 0 2px #0000000d,0 1px 4px #00000014}.brand{display:flex;align-items:center;width:300px;gap:8px;font-size:24px;font-weight:500;color:#111827}.brand img{width:40px;height:40px;border-radius:10px;object-fit:cover}.menu-btn{margin-left:32px;background:transparent!important;border:0!important;color:#6b7280!important;width:48px;min-height:48px;padding:0;font-size:24px}.side{position:fixed;top:112px;bottom:32px;left:32px;width:300px;padding:8px 24px;background:#fff;border-radius:12px;overflow:auto;z-index:999;box-shadow:0 3px 5px #00000005,0 0 2px #0000000d,0 1px 4px #00000014}.section{margin:12px 0;font-size:13.7px;font-weight:700;text-transform:uppercase;color:#111827}.nav{display:flex;gap:8px;align-items:center;padding:12px 16px;border-radius:12px;color:#4b5563;margin:0;font-size:16px}.nav:hover{background:#f6f9fc}.nav.active{color:var(--primary);font-weight:700}.main{margin-left:300px;padding:112px 32px 32px 64px;min-height:100vh;display:flex;flex-direction:column}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:32px}.head h1{font-size:32px;font-weight:700;line-height:1.2;margin:0 0 8px;color:#111827}.head p{margin:0;color:#334155;line-height:1.5}.eyebrow{font-size:12px;font-weight:800;text-transform:uppercase;margin-bottom:14px;color:#111827}.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:16px}.card{background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:32px;min-width:0;color:#334155}.span3{grid-column:span 3}.span4{grid-column:span 4}.span6{grid-column:span 6}.span8{grid-column:span 8}.span9{grid-column:span 9}.span12{grid-column:span 12}.metric{min-height:132px}.metric small,.label{display:block;color:#111827;font-size:16px;text-transform:none;margin-bottom:18px;font-weight:500}.metric strong{font-size:20px;color:#111827;font-weight:500}.actions{display:flex;flex-wrap:wrap;gap:10px}.btn{min-height:50px;padding:14px 20px;border:1px solid var(--primary);border-radius:6px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;line-height:1.25}.btn:hover{background:var(--primary2)}.btn.out{background:transparent;color:var(--primary)}.btn.info{background:#0ea5e9;border-color:#0ea5e9}.btn.text{background:transparent;border-color:transparent;color:var(--primary)}.btn.danger{background:var(--danger);border-color:var(--danger)}.btn:disabled{opacity:.65;cursor:default}.input,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;font-size:16px;min-height:48px}.field{display:grid;gap:7px;margin-bottom:16px}.field label{font-weight:600}.msg{border-radius:6px;padding:13px 15px;margin:10px 0;background:#eef2ff;color:#3730a3}.msg.ok{background:#ecfdf5;color:#166534}.msg.warn{background:#fff7ed;color:#9a3412}.msg.err{background:#fef2f2;color:#991b1b}.tag{display:inline-flex;padding:4px 8px;border-radius:6px;background:#dcfce7;color:#166534;font-size:13px;font-weight:700}.tag.warn{background:#ff7a1a;color:#fff}.row{display:flex;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid #eef2f7}.row:last-child{border:0}.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.auth{width:min(672px,100%);border:1px solid var(--border);border-radius:24px;padding:4px;background:#fff}.auth-in{border-radius:20px;padding:36px 48px}.auth-title{text-align:center}.auth-title img{width:68px;height:68px;border-radius:10px}.auth-title h1{font-size:30px;font-weight:500;margin:16px 0 8px}.auth-title p{margin:0 0 25px;color:#111827;line-height:1.5}.auth .btn{width:100%;margin-top:8px}.toolbar{display:none;position:fixed;right:18px;bottom:16px;background:#0f172a;color:#fff;border-radius:10px;padding:8px;gap:5px;z-index:1000;box-shadow:0 8px 30px #0003}.controls .toolbar{display:flex}.toolbar button{border:0;border-radius:5px;padding:7px 9px;cursor:pointer}.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.plan h2{margin-top:0}.price{font-size:26px;font-weight:800;color:#1e293b}.device{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:12px;align-items:center}.hero{padding:32px;display:flex;justify-content:space-between;gap:24px;align-items:flex-start}.hero h1{font-size:32px;max-width:740px;margin:0 0 12px;line-height:1.15}.hero .actions{flex-direction:column;min-width:114px}.home-cards{margin-top:16px}.home-card{min-height:250px;color:var(--primary)}.home-card strong{font-size:22px}.subtle{color:var(--muted);line-height:1.55}.hide{display:none!important}.mock-note{font-size:16px;color:#64748b;margin-top:20px;text-align:center}.side-note{margin:28px 16px;color:#111827;line-height:1.5;font-size:14px}.side-note strong{display:block;margin-bottom:8px}.mock-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:center;align-items:center;gap:10px}.mock-footer img{width:14px;height:14px;border-radius:3px}
    .top-actions{margin-left:auto;display:flex;align-items:center;gap:16px}.top-actions a{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:24px}.top-actions a:hover{background:#f6f9fc;color:#111827}.progress{height:8px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin:16px 0}.progress:after{content:'';display:block;height:100%;width:42%;background:var(--primary);animation:slide 1.2s infinite alternate}.mock-controls{display:none}.controls .mock-controls{display:block}@keyframes slide{from{transform:translateX(-60%)}to{transform:translateX(180%)}}
    @media(max-width:991px){.span3,.span4,.span6,.span8,.span9{grid-column:span 12}.plans{grid-template-columns:1fr}.side{transform:translateX(-110%);left:0;top:0;bottom:0;border-radius:0 12px 12px 0;transition:.2s}.side.open{transform:none}.main{margin-left:0;padding:112px 32px 32px}.top{padding:0 32px;justify-content:space-between}.brand{width:auto;order:2}.menu-btn{display:inline-flex;margin:0;order:1}.top-actions{display:none}.top:after{content:'⋮';order:3;font-size:30px;color:#6b7280;width:48px;text-align:center}.device{grid-template-columns:1fr auto}.device .desktop{display:none}.hero{flex-direction:column}.hero .actions{width:100%}.home-card{min-height:0}.toolbar{left:12px;right:12px;overflow:auto}}
    @media(max-width:480px){.main{padding:112px 30px 30px}.top{padding:0 30px}.brand{font-size:24px}.auth-wrap{align-items:flex-start;padding:12px}.auth-in{padding:20px 16px}.auth-title img{width:56px;height:56px}.auth-title h1{font-size:32px;line-height:1.15}.card{padding:32px;overflow:hidden}.card *{max-width:100%;overflow-wrap:anywhere}.row{min-width:0;flex-wrap:wrap}.head{flex-direction:column;margin-bottom:32px}.head h1{font-size:32px}.metric{min-height:128px}.hero h1{font-size:32px}.toolbar{font-size:12px}}
  </style>
</head>
<body>
  <header class="top"><a class="brand" href="#/" data-go="/"><img src="../../../public/clean-pay-logo.png" alt="Clean Pay"><span>Clean Pay</span></a><button class="btn out menu-btn" id="menu" aria-label="Открыть меню">☰</button><nav class="top-actions" aria-label="Быстрые действия"><a data-go="/cabinet" title="Кабинет">⌂</a><a data-go="/tariffs" title="Тарифы">◇</a><a data-go="/profile" title="Профиль">♙</a><a data-go="/link-account" title="Связать аккаунт">↗</a><a data-go="/support" title="Поддержка">?</a><a data-go="/login" title="Выйти">⇥</a></nav></header>
  <aside class="side" id="side">
    <div class="section">Clean Pay</div>
    <a class="nav" data-go="/cabinet">⌂ Кабинет</a><a class="nav" data-go="/tariffs">▦ Изменить тариф</a><a class="nav" data-go="/extend">↻ Продление</a>
    <div class="section">Аккаунт</div>
    <a class="nav" data-go="/profile">○ Профиль</a><a class="nav" data-go="/verify-email">✉ Подтвердить e-mail</a><a class="nav" data-go="/link-account">↗ Связать аккаунт</a>
    <div class="section">Помощь</div><a class="nav" data-go="/support">? Поддержка</a><a class="nav" data-go="/login">⇥ Выйти</a>
    <div class="side-note"><strong>Clean Pay</strong>Оплата, продление и профиль<br>в едином web-кабинете.</div>
    <div class="mock-controls"><div class="section">Все экраны макета</div><select id="routeSelect" aria-label="Маршрут"></select><p class="subtle">Режим контролов включается через <code>?controls=1</code>.</p></div>
  </aside>
  <main class="main" id="view"></main>
  <div class="toolbar" aria-label="Состояние экрана"><button data-state="data">Данные</button><button data-state="loading">Загрузка</button><button data-state="empty">Пусто</button><button data-state="error">Ошибка</button></div>
  <script>
    const routes=['/','/login','/register','/register/verify-email','/verify-email','/passkey/setup','/auth/telegram/webapp','/cabinet','/tariffs','/payment','/extend','/payment/success','/payment/fail','/payment/pending','/profile','/link-account','/support','/install','/offline'];
    const meta={
      '/':['Clean Pay','Web-кабинет для оплаты и управления подпиской'], '/cabinet':['Личный кабинет','Статус подписки, подключение, устройства и платежи в одном рабочем экране.'], '/tariffs':['Тарифы','Доступные тарифы, длительности и способы оплаты загружаются для Clean Pay.'], '/payment':['Подтверждение оплаты','Проверьте выбранный тариф перед переходом к платёжной странице.'], '/extend':['Продление подписки','Выберите доступное предложение продления и способ оплаты.'], '/profile':['Профиль','Данные аккаунта, e-mail и пароль управляются через Clean Pay.'], '/link-account':['Способы входа','Управляйте способами входа и восстановления доступа.'], '/verify-email':['Подтверждение e-mail','Запросите код и подтвердите e-mail, чтобы разблокировать покупку.'], '/support':['Поддержка','Контакты поддержки пока не опубликованы.']
    };
    const authMeta={
      '/login':['Вход','Введите e-mail. Если аккаунт уже есть, покажем вход по паролю или быстрый вход. Если аккаунта нет, создадим его здесь же.'], '/register':['Регистрация','Создайте e-mail аккаунт для оплаты и управления подпиской.'], '/register/verify-email':['Подтверждение e-mail','Введите 6 цифр из письма, чтобы завершить регистрацию.'], '/passkey/setup':['Быстрый вход','Можно настроить вход по Face ID, отпечатку или PIN-коду. Это удобно, но не обязательно.'], '/auth/telegram/webapp':['Вход через Telegram','Открываем личный кабинет из Telegram.'], '/install':['Установить Clean Pay','Добавьте кабинет на главный экран с названием и логотипом Clean Pay.'], '/offline':['Нет подключения','Проверьте интернет-соединение и откройте Clean Pay снова.']
    };
    let route=location.hash.slice(1)||'/cabinet', state='data';
    const h=(title,desc,actions='')=>`<div class="head"><div><h1>${title}</h1><p>${desc}</p></div><div class="actions">${actions}</div></div>`;
    const message=()=>state==='loading'?'<div class="msg">Загрузка...</div>':state==='error'?'<div class="msg err">Не удалось загрузить данные. Попробуйте ещё раз.</div>':state==='empty'?'<div class="msg">Данных пока нет.</div>':'';
    function auth(content){const [title,desc]=authMeta[route];return `<div class="auth-wrap"><div class="auth"><div class="auth-in"><div class="auth-title"><img src="../../../public/clean-pay-logo.png" alt="Clean Pay"><h1>${title}</h1><p>${desc}</p></div>${message()||content}<div class="mock-note"><a data-go="/" style="color:var(--primary);font-weight:700">Clean Pay</a></div></div></div></div>`}
    function authScreen(){
      if(route==='/login')return auth(`<div class="field"><label>E-mail</label><input class="input" type="email" placeholder="user@example.com"></div><button class="btn" data-next="login">Продолжить</button><button class="btn info" data-go="/auth/telegram/webapp">✈&nbsp; Войти через Telegram</button>`);
      if(route==='/register')return auth(`<div class="field"><label>E-mail</label><input class="input" type="email" placeholder="user@example.com"></div><div class="field"><label>Пароль</label><input class="input" type="password" placeholder="Придумайте пароль"></div><div class="field"><label>Повторите пароль</label><input class="input" type="password" placeholder="Введите пароль еще раз"></div><button class="btn" data-go="/register/verify-email">Зарегистрироваться</button>`);
      if(route==='/register/verify-email')return auth(`<div class="field"><label>Код из письма</label><input class="input" inputmode="numeric" maxlength="6" placeholder="000000"></div><button class="btn" data-go="/passkey/setup">Подтвердить e-mail</button><button class="btn out">Отправить код повторно</button><button class="btn text" data-go="/register">Назад</button>`);
      if(route==='/passkey/setup')return auth(`<div class="field"><label>Название устройства</label><input class="input" placeholder="Например: Android Chrome или ноутбук"></div><button class="btn" data-go="/cabinet">Настроить быстрый вход</button><button class="btn out" data-go="/cabinet">Продолжить без него</button>`);
      if(route==='/auth/telegram/webapp')return auth(`<div class="progress" role="progressbar" aria-label="Вход через Telegram"></div><div class="msg">Входим через Telegram...</div>`);
      if(route==='/install')return auth(`<p class="subtle" style="text-align:center">На Android нажмите кнопку ниже и подтвердите установку. На iPhone подробная инструкция откроется автоматически и покажет все действия в Safari.</p><button class="btn" data-action="toast">Установить приложение</button>`);
      return auth(`<p class="subtle" style="text-align:center">Для работы с подпиской и платежами требуется подключение к интернету.</p>`);
    }
    function home(){return `<section class="card hero"><div><div class="eyebrow">Clean Pay</div><h1>Web-кабинет для оплаты и управления<br>подпиской</h1><p>Кабинет помогает оплачивать, продлевать подписку и управлять VPN-доступом.</p></div><div class="actions"><a class="btn" data-go="/login">⇥&nbsp; Войти</a><a class="btn out" data-go="/tariffs">Тарифы</a></div></section><div class="grid home-cards">${[['Кабинет','Подписка','Статус, устройства и ссылка доступа','/cabinet','⌂'],['Профиль','Аккаунт','E-mail, пароль и Telegram ID','/profile','♙'],['Привязать Telegram','Связь аккаунта','Добавить Telegram ID к текущему профилю','/link-account','↗'],['Поддержка','Помощь','Контакты и ответы по оплате','/support','?']].map(x=>`<a class="card span3 home-card" data-go="${x[3]}"><div class="row"><span>${x[0]}</span><strong>${x[4]}</strong></div><strong>${x[1]}</strong><p>${x[2]}</p></a>`).join('')}</div>`}
    function cabinet(){return `<div class="eyebrow">Clean Pay</div>${h(...meta[route],'<a class="btn out" data-go="/tariffs">Тарифы</a>')}${message()||`<div class="grid"><div class="card span3 metric"><small>Подписка <span style="float:right">♢</span></small><strong>Не активна</strong></div><div class="card span3 metric"><small>Действует до <span style="float:right">▣</span></small><strong>-</strong></div><div class="card span3 metric"><small>Устройства <span style="float:right">▯</span></small><strong>-</strong></div><div class="card span3 metric"><small>Трафик <span style="float:right">▤</span></small><strong>- / -</strong></div><section class="card span9"><div class="row"><strong>Текущая подписка</strong><span class="tag warn">Нет подписки</span></div><h2>Подписка не активна</h2><div class="actions"><a class="btn" data-go="/tariffs">Выбрать тариф</a><a class="btn out" data-go="/link-account">Привязать аккаунт</a></div></section><section class="card span3"><h2>Профиль</h2><div class="row"><span>E-MAIL<br><strong>visual-spec-20260722@example.com</strong></span></div><div class="row"><span>TELEGRAM<br><strong>Не привязан</strong></span></div><div><small>E-MAIL ПОДТВЕРЖДЁН</small><br><span class="tag">Да</span></div></section><section class="card span12"><h2>История платежей</h2><div class="msg">ⓘ Платежей через web-кабинет пока нет.</div><div class="row"><strong>Платёж</strong><strong>Дата</strong><strong>Gateway</strong><strong>Сумма</strong><strong>Статус</strong></div><p class="subtle">Платежей через web-кабинет пока нет.</p></section><section class="card span12"><h2>Поддержка</h2><p class="subtle">Контакты поддержки доступны в отдельном разделе.</p><a class="btn out" data-go="/support">Открыть поддержку</a></section></div>`}`}
    function tariffs(){return `<div class="eyebrow">Clean Pay</div>${h(...meta[route])}${message()||`<div class="msg">ⓘ Доступных тарифов пока нет.</div>`}`}
    function payment(extend=false){if(extend)return `<div class="eyebrow">Clean Pay</div>${h(...meta[route])}${message()||`<div class="msg">ⓘ Действующая подписка не найдена. Сначала выберите тариф.</div>`}`;return `<div class="eyebrow">Clean Pay</div>${h(...meta[route])}${message()||`<div class="card"><div class="msg">ⓘ Для оплаты сначала выберите тариф, срок и способ оплаты.</div><a class="btn" data-go="/tariffs">Выбрать тариф</a></div>`}`}
    function profile(){return `<div class="eyebrow">Clean Pay</div>${h(...meta[route])}${message()||`<div class="card"><section class="card"><h2>Данные аккаунта</h2><div class="grid"><div class="card span6"><small>E-MAIL</small><br><strong>visual-spec-20260722@example.com</strong></div><div class="card span6"><small>ТИП ВХОДА</small><br><strong>E-mail</strong></div><div class="card span6"><small>TELEGRAM</small><br><strong>Не привязан</strong></div><div class="card span6"><small>E-MAIL ПОДТВЕРЖДЁН</small><br><span class="tag">Да</span></div></div></section><section class="card"><h2>Смена e-mail</h2><div class="field"><label>Новый e-mail</label><input class="input" type="email" value="visual-spec-20260722@example.com"></div><button class="btn">Сохранить и отправить код</button></section><section class="card"><h2>Смена пароля</h2><div class="field"><label>Текущий пароль</label><input class="input" type="password"></div><div class="field"><label>Новый пароль</label><input class="input" type="password"></div><button class="btn">Изменить пароль</button></section></div>`}`}
    function verify(){return `<div class="eyebrow">Clean Pay</div>${h(...meta[route])}${message()||`<div class="card"><h2>Подтверждение e-mail</h2><div class="msg ok">✓ E-mail уже подтверждён. Повторно вводить код не нужно.</div><a class="btn" data-go="/profile">Перейти в профиль</a></div>`}`}
    function link(){return `<div class="eyebrow">Clean Pay</div>${h(...meta[route])}${message()||`<div class="grid"><section class="card span6"><div class="row"><h2>✉&nbsp; E-mail</h2><span class="tag">Подключено</span></div><p class="subtle">Используется для входа по паролю и восстановления доступа.</p><div class="msg">visual-spec-20260722@example.com</div></section><section class="card span6"><div class="row"><h2>✈&nbsp; Telegram</h2><span class="tag" style="background:#6366f1;color:#fff">Не подключено</span></div><p class="subtle">Дополнительный вход и восстановление доступа через Telegram.</p><button class="btn info">✈&nbsp; Привязать Telegram</button></section><section class="card span6"><div class="row"><h2>♙&nbsp; Быстрый вход</h2><span class="tag" style="background:#6366f1;color:#fff">Не подключено</span></div><p class="subtle">Можно добавить вход по Face ID, отпечатку или PIN-коду устройства.</p><div class="actions"><a class="btn" data-go="/passkey/setup">♙&nbsp; Настроить</a><button class="btn out">Позже</button></div></section></div>`}`}
    function support(){return `<div class="eyebrow">Clean Pay</div>${h(...meta[route])}${message()||`<div class="card"><h2>Контакты Clean Pay</h2><div class="actions"><a class="btn out" href="mailto:support@example.com">✉&nbsp; Написать на почту</a><a class="btn out" href="#">✈&nbsp; Telegram</a><a class="btn out" href="#">▣&nbsp; FAQ и инструкции</a></div></div><div class="card"><h2>Как подключиться</h2><p>1. Войдите в web-кабинет и откройте раздел подписки.</p><p>2. Купите или продлите тариф, если активной подписки нет.</p><p>3. Нажмите кнопку подключения или скопируйте ссылку подписки.</p><p>4. Если устройство потеряло доступ, удалите его в кабинете или перевыпустите ссылку.</p></div><div class="card"><h2>Для кого этот сайт</h2><p>Web-кабинет Clean Pay предназначен для пользователей, которые хотят оплачивать и управлять подпиской без Telegram-бота.</p></div>`}`}
    function returns(){const kind=route.split('/').pop();return `<div class="eyebrow">Clean Pay</div>${h('Статус платежа требует проверки',kind==='fail'?'Возврат от провайдера не является подтверждением результата — сверяем серверный статус.':'Результат определяется по локальной операции, провайдеру и актуальной подписке.')}${message()||`<div class="card"><div class="msg warn">⚠ Локальная запись платежа не найдена. Проверьте кабинет позже.</div></div><div class="actions" style="margin-top:48px"><button class="btn out">↻&nbsp; Обновить статус</button><a class="btn" data-go="/cabinet">Открыть кабинет</a>${kind==='fail'?'<a class="btn out" data-go="/tariffs">Вернуться к тарифам</a>':''}</div>`}`}
    function render(){
      if(!routes.includes(route))route='/cabinet'; document.body.classList.toggle('auth-mode',!!authMeta[route]); document.querySelector('.top').classList.toggle('hide',!!authMeta[route]); document.querySelector('.side').classList.toggle('hide',!!authMeta[route]); document.querySelector('.main').style.marginLeft=authMeta[route]?'0':'';
      let html=authMeta[route]?authScreen():route==='/'?home():route==='/cabinet'?cabinet():route==='/tariffs'?tariffs():route==='/payment'?payment():route==='/extend'?payment(true):route==='/profile'?profile():route==='/verify-email'?verify():route==='/link-account'?link():route==='/support'?support():route.startsWith('/payment/')?returns():'';
      if(!authMeta[route]) html += `<footer class="mock-footer"><img src="../../../public/clean-pay-logo.png" alt=""><span>Clean Pay</span></footer>`; view.innerHTML=html; routeSelect.value=route; document.querySelectorAll('[data-go]').forEach(el=>el.onclick=e=>{e.preventDefault();go(el.dataset.go)}); document.querySelectorAll('[data-action="toast"]').forEach(el=>el.onclick=()=>alert('Действие выполнено в демонстрационном макете.'));
      document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('active',x.dataset.go===route));
    }
    function go(next){route=next;state='data';location.hash=next;side.classList.remove('open');render()}
    routeSelect.innerHTML=routes.map(r=>`<option>${r}</option>`).join('');routeSelect.onchange=()=>go(routeSelect.value);menu.onclick=()=>side.classList.toggle('open');document.querySelectorAll('[data-state]').forEach(b=>b.onclick=()=>{state=b.dataset.state;render()});if(new URLSearchParams(location.search).get('controls')==='1')document.body.classList.add('controls');window.onhashchange=()=>{route=location.hash.slice(1)||'/cabinet';render()};render();
  </script>
</body>
</html>
