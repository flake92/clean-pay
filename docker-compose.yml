name: ${COMPOSE_PROJECT_NAME:-clean-pay-dev}

# Стек внешних зависимостей и имитаторов Clean Pay.
# Сервиса приложения здесь намеренно нет: будущий Ruby-монолит добавляется
# отдельным compose override после реализации контрактов software-spec/.

x-remnashop-env: &remnashop-env
  APP_DOMAIN: remnashop.localhost
  APP_HOST: 0.0.0.0
  APP_PORT: "5000"
  APP_CRYPT_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  APP_SWAGGER_ENABLED: "true"
  WEB_ENABLED: "true"
  WEB_CABINET_URL: ${CLEAN_PAY_WEBAPP_URL:-https://clean-pay.localhost/auth/telegram/webapp}
  APP_API_KEY: dev-remnashop-api-key-change-me
  APP_JWT_SECRET: dev-remnashop-jwt-secret-change-me

  BOT_TOKEN: "0000000000:dev-telegram-bot-token-placeholder"
  BOT_SECRET_TOKEN: dev-bot-secret-token
  BOT_OWNER_ID: "1"
  BOT_SUPPORT_USERNAME: cleanpay_support
  BOT_API_BASE_URL: http://telegram-mock:8080
  BOT_MINI_APP: "false"
  BOT_RESET_WEBHOOK: "false"
  BOT_DROP_PENDING_UPDATES: "false"
  BOT_SETUP_COMMANDS: "false"

  REMNAWAVE_HOST: http://remnawave-mock:3000
  REMNAWAVE_TOKEN: dev-remnawave-token
  REMNAWAVE_WEBHOOK_SECRET: dev-remnawave-webhook-secret

  DATABASE_HOST: remnashop-postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: remnashop
  DATABASE_USER: remnashop
  DATABASE_PASSWORD: remnashop
  REDIS_HOST: remnashop-cache
  REDIS_PORT: "6379"
  REDIS_NAME: "0"
  REDIS_PASSWORD: ""

  EMAIL_ENABLED: "true"
  EMAIL_HOST: smtp
  EMAIL_PORT: "1025"
  EMAIL_USE_TLS: "false"
  EMAIL_USE_SSL: "false"
  EMAIL_USERNAME: dev-smtp-user
  EMAIL_PASSWORD: dev-smtp-password
  EMAIL_FROM_EMAIL: no-reply@example.com
  EMAIL_FROM_NAME: Clean Pay Prestage
  EMAIL_VERIFICATION_CODE_TTL_MINUTES: "15"
  SMTP_ENABLED: "true"
  SMTP_HOST: smtp
  SMTP_PORT: "1025"
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_TLS: "false"
  SMTP_USE_SSL: "false"
  SMTP_USERNAME: dev-smtp-user
  SMTP_PASSWORD: dev-smtp-password
  SMTP_USER: dev-smtp-user
  SMTP_PASS: dev-smtp-password
  SMTP_FROM_EMAIL: no-reply@example.com
  SMTP_FROM_NAME: Clean Pay Prestage
  MAIL_ENABLED: "true"
  MAIL_HOST: smtp
  MAIL_PORT: "1025"
  MAIL_TLS: "false"
  MAIL_SSL: "false"
  MAIL_USE_TLS: "false"
  MAIL_USE_SSL: "false"
  MAIL_USERNAME: dev-smtp-user
  MAIL_PASSWORD: dev-smtp-password
  MAIL_USER: dev-smtp-user
  MAIL_PASS: dev-smtp-password
  MAIL_FROM_EMAIL: no-reply@example.com
  MAIL_FROM_NAME: Clean Pay Prestage
  LOG_TO_FILE: "false"
  LOG_LEVEL: DEBUG

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clean_pay}
      POSTGRES_USER: ${POSTGRES_USER:-clean_pay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clean_pay}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  remnashop:
    build:
      context: https://github.com/flake92/remnashop.git#b9da68a651e9ab0b7ed52d030e13754311614759
      dockerfile: Dockerfile
      args:
        BUILD_BRANCH: codex/clean-pay-integration-upstream-dev
        BUILD_COMMIT: b9da68a651e9ab0b7ed52d030e13754311614759
    image: clean-pay-dev-remnashop:latest
    restart: unless-stopped
    environment:
      <<: *remnashop-env
    depends_on:
      remnashop-postgres:
        condition: service_healthy
      remnashop-cache:
        condition: service_healthy
      smtp:
        condition: service_started
      telegram-mock:
        condition: service_started
    volumes:
      - remnashop-assets:/opt/remnashop/assets
      - remnashop-logs:/opt/remnashop/logs
    ports:
      - "127.0.0.1:${REMNASHOP_PORT:-5001}:5000"

  remnashop-worker:
    image: clean-pay-dev-remnashop:latest
    restart: unless-stopped
    command: taskiq worker src.infrastructure.taskiq.worker:worker --workers 1 --ack-type when_received --tasks-pattern src/infrastructure/taskiq/tasks/*.py -fsd
    environment:
      <<: *remnashop-env
    depends_on:
      remnashop-postgres:
        condition: service_healthy
      remnashop-cache:
        condition: service_healthy

  remnashop-scheduler:
    image: clean-pay-dev-remnashop:latest
    restart: unless-stopped
    command: taskiq scheduler src.infrastructure.taskiq.scheduler:scheduler --tasks-pattern src/infrastructure/taskiq/tasks/*.py -fsd
    environment:
      <<: *remnashop-env
    depends_on:
      remnashop-postgres:
        condition: service_healthy
      remnashop-cache:
        condition: service_healthy

  remnashop-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: remnashop
      POSTGRES_USER: remnashop
      POSTGRES_PASSWORD: remnashop
      TZ: UTC
    volumes:
      - remnashop-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remnashop -d remnashop"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${REMNASHOP_POSTGRES_PORT:-6767}:5432"

  remnashop-cache:
    image: valkey/valkey:9-alpine
    restart: unless-stopped
    command: valkey-server --save "" --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru --loglevel warning
    volumes:
      - remnashop-cache-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  remnawave-mock:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /mock
    command: node server.js
    volumes:
      - ./infra/test/remnawave-mock:/mock:ro
    ports:
      - "127.0.0.1:${REMNAWAVE_MOCK_PORT:-3001}:3000"

  telegram-mock:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /mock
    command: node server.js
    volumes:
      - ./infra/test/telegram-mock:/mock:ro
    ports:
      - "127.0.0.1:${TELEGRAM_MOCK_PORT:-8082}:8080"

  telegram-oidc-mock:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /mock
    command: node server.js
    environment:
      PORT: "8090"
      OIDC_ISSUER: http://telegram-oidc-mock:8090
      OIDC_PUBLIC_ISSUER: http://localhost:${TELEGRAM_OIDC_MOCK_PORT:-8090}
      OIDC_CLIENT_ID: dev-telegram-client-id
    volumes:
      - ./infra/test/telegram-oidc-mock:/mock:ro
    ports:
      - "127.0.0.1:${TELEGRAM_OIDC_MOCK_PORT:-8090}:8090"

  smtp:
    image: axllent/mailpit@sha256:37a38e48e9338cd7e89dfeb487f37b02ebfcd9cb23111bed2d345e79d37d6dd6
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_WEBHOOK_URL: http://smtp-log:8126/
      MP_WEBHOOK_LIMIT: "0"
    ports:
      - "127.0.0.1:${MAILPIT_HTTP_PORT:-8025}:8025"
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
    depends_on:
      smtp-log:
        condition: service_started
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 20

  smtp-log:
    image: node:24-alpine
    restart: unless-stopped
    working_dir: /logger
    command: node server.js
    environment:
      MAILPIT_API_URL: http://smtp:8025
      SMTP_LOG_MAX_BODY_CHARS: "12000"
    volumes:
      - ./infra/test/mailpit-logger:/logger:ro

  caddy:
    profiles: ["edge"]
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_UPSTREAM: ${APP_UPSTREAM:-host.docker.internal:4000}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./infra/test/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      remnashop:
        condition: service_started
      smtp:
        condition: service_started
    ports:
      - "127.0.0.1:${CADDY_APP_PORT:-8080}:8080"
      - "127.0.0.1:${CADDY_REMNASHOP_PORT:-8081}:8081"
      - "127.0.0.1:${CADDY_MAILPIT_PORT:-8026}:8026"

volumes:
  postgres-data:
    name: ${CLEAN_PAY_POSTGRES_VOLUME:-clean-pay-dev_postgres-data}
  redis-data:
    name: ${CLEAN_PAY_REDIS_VOLUME:-clean-pay-dev_redis-data}
  remnashop-postgres-data:
    name: ${REMNASHOP_POSTGRES_VOLUME:-clean-pay-dev_remnashop-postgres-data}
  remnashop-cache-data:
    name: ${REMNASHOP_CACHE_VOLUME:-clean-pay-dev_remnashop-cache-data}
  remnashop-assets:
    name: ${REMNASHOP_ASSETS_VOLUME:-clean-pay-dev_remnashop-assets}
  remnashop-logs:
    name: ${REMNASHOP_LOGS_VOLUME:-clean-pay-dev_remnashop-logs}
  caddy-data:
    name: ${CADDY_DATA_VOLUME:-clean-pay-dev_caddy-data}
  caddy-config:
    name: ${CADDY_CONFIG_VOLUME:-clean-pay-dev_caddy-config}

networks:
  default:
    name: ${CLEAN_PAY_PRESTAGE_NETWORK:-clean-pay-prestage}
