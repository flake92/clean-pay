name: ${COMPOSE_PROJECT_NAME:-clean-pay}

services:
  app:
    image: ${CLEAN_PAY_IMAGE:-clean-pay:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
        TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
        NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-Clean Pay}
        NEXT_PUBLIC_BRAND_LOGO_URL: ${NEXT_PUBLIC_BRAND_LOGO_URL:-/clean-pay-logo.png}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${CLEAN_PAY_BIND:-127.0.0.1}:${CLEAN_PAY_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/health/readiness').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  reconciliation-worker:
    profiles: ["reconciliation"]
    image: ${CLEAN_PAY_IMAGE:-clean-pay:local}
    restart: "on-failure:5"
    command: ["node", "deploy/prod/reconcile-loop.mjs"]
    env_file: .env
    environment:
      NODE_ENV: production
      PAYMENT_RECONCILIATION_INTERNAL_URL: http://app:4000/api/internal/payments/reconcile
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const fs=require('node:fs');const value=Number(fs.readFileSync('/tmp/clean-pay-reconciliation-heartbeat','utf8'));const interval=Number(process.env.PAYMENT_RECONCILIATION_INTERVAL_SECONDS||30);const maxAge=(Math.max(120,interval*2+60))*1000;if(!Number.isFinite(value)||Date.now()-value>maxAge)process.exit(1)"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clean_pay}
      POSTGRES_USER: ${POSTGRES_USER:-clean_pay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clean_pay} -d ${POSTGRES_DB:-clean_pay}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
