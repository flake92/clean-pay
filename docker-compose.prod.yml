services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clean_pay}?schema=public
      APP_URL: ${APP_URL:-https://oplata.clear-vpn.org}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://oplata.clear-vpn.org}
      REMNASHOP_API_BASE_URL: ${REMNASHOP_API_BASE_URL:?Set REMNASHOP_API_BASE_URL}
      WEB_JWT_SECRET: ${WEB_JWT_SECRET:?Set WEB_JWT_SECRET}
      WEB_REFRESH_SECRET: ${WEB_REFRESH_SECRET:?Set WEB_REFRESH_SECRET}
      AUDIT_IP_HASH_SECRET: ${AUDIT_IP_HASH_SECRET:?Set AUDIT_IP_HASH_SECRET}
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: lax
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?Set SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:?Set SMTP_FROM}
      TELEGRAM_OIDC_ISSUER: ${TELEGRAM_OIDC_ISSUER:?Set TELEGRAM_OIDC_ISSUER}
      TELEGRAM_OIDC_AUTHORIZATION_ENDPOINT: ${TELEGRAM_OIDC_AUTHORIZATION_ENDPOINT:?Set TELEGRAM_OIDC_AUTHORIZATION_ENDPOINT}
      TELEGRAM_OIDC_TOKEN_ENDPOINT: ${TELEGRAM_OIDC_TOKEN_ENDPOINT:?Set TELEGRAM_OIDC_TOKEN_ENDPOINT}
      TELEGRAM_OIDC_JWKS_URI: ${TELEGRAM_OIDC_JWKS_URI:?Set TELEGRAM_OIDC_JWKS_URI}
      TELEGRAM_OIDC_CLIENT_ID: ${TELEGRAM_OIDC_CLIENT_ID:?Set TELEGRAM_OIDC_CLIENT_ID}
      TELEGRAM_OIDC_CLIENT_SECRET: ${TELEGRAM_OIDC_CLIENT_SECRET:?Set TELEGRAM_OIDC_CLIENT_SECRET}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-true}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      TURNSTILE_VERIFY_URL: ${TURNSTILE_VERIFY_URL:-https://challenges.cloudflare.com/turnstile/v0/siteverify}
      SUPPORT_ENABLED: ${SUPPORT_ENABLED:-false}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      SUPPORT_TELEGRAM_USERNAME: ${SUPPORT_TELEGRAM_USERNAME:-}
      SUPPORT_FAQ_URL: ${SUPPORT_FAQ_URL:-}
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://127.0.0.1:3000/api/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: ${POSTGRES_DB:-clean_pay}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB:-clean_pay}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-oplata.clear-vpn.org}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
