name: ${COMPOSE_PROJECT_NAME:-clean-pay-prod}

services:
  app:
    image: ${CLEAN_PAY_IMAGE:-clean-pay-prod-app:local}
    build:
      context: ../..
      dockerfile: deploy/prod/Dockerfile
      args:
        TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
        TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
        NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-Clean Pay}
        NEXT_PUBLIC_BRAND_LOGO_URL: ${NEXT_PUBLIC_BRAND_LOGO_URL:-/logo.svg}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${CLEAN_PAY_BIND:-127.0.0.1}:${CLEAN_PAY_PORT:-4000}:4000"
    networks:
      default:
      edge:
        aliases:
          - clean-pay
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clean_pay}
      POSTGRES_USER: ${POSTGRES_USER:-clean_pay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clean_pay} -d ${POSTGRES_DB:-clean_pay}"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres-data:
  redis-data:

networks:
  edge:
    external: true
    name: ${CLEAN_PAY_EDGE_NETWORK:-remnawave-network}
